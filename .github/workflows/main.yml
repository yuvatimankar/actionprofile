name: Build WF
on: 
  push:
    branches:
      - main

  pull_request:
         branches:
          - main

  workflow_dispatch:

  schedule:
    - cron: '10 14 * * 1-5' # Runs every day at 2

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven build
        run: mvn clean install 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify build failure
        if: failure()
        run: echo "Build failed! Please check the logs for details."
  
  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven test
        if: github.ref == 'refs/heads/main' 
        run: mvn test

      - name: checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "skipping unit tests for non-main branch"
  
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Run Trivy security scan
        if: github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: 'os,library'
          output: 'trivy-report.json'

      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: trivy-report
          path: trivy-report.json