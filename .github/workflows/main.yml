name: Build WF
on: 
  push:
    branches:
      - main

  pull_request:
         branches:
          - main

  workflow_dispatch:

  schedule:
    - cron: '10 14 * * 1-5' # Runs every day at 2

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven build
        run: mvn clean install 

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify build failure
        if: failure()
        run: echo "Build failed! Please check the logs for details."
  
  Testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven test
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle